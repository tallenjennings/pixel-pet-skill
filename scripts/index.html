<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Pet Skill Runner</title>
</head>
<body>
  <script src="pet-core.js"></script>
  <script>
    const DASHBOARD_URL = 'dashboard.html';
    const ACTIONS = new Set([
      'start_pet', 'show_dashboard', 'status', 'feed_meal', 'feed_snack',
      'play', 'clean', 'medicine', 'discipline', 'sleep', 'wake', 'tick'
    ]);

    function normalizedAction(payload) {
      const raw = (payload.action || 'status').toString().trim().toLowerCase();
      if (!raw) return 'status';
      if (ACTIONS.has(raw)) return raw;
      if (['show', 'display', 'open_dashboard', 'show_my_pet', 'open'].includes(raw)) return 'show_dashboard';
      return 'status';
    }

    function responseFor(output, action) {
      const response = {
        result: output.result,
        narration: output.narration,
        dead: output.dead,
        sprite_variant: output.sprite_variant,
        pet: output.pet,
        version: output.version
      };

      const shouldShowWebview = action === 'show_dashboard' || action === 'start_pet';
      if (shouldShowWebview) {
        response.webview = {
          url: `${DASHBOARD_URL}?v=${Date.now()}`,
          aspectRatio: 1.0
        };
      }

      response.dashboard_url = `${DASHBOARD_URL}?v=${Date.now()}`;
      return response;
    }

    window['ai_edge_gallery_get_result'] = async (dataStr) => {
      try {
        const payload = JSON.parse(dataStr || '{}');
        const action = normalizedAction(payload);
        const output = window.PixelPetCore.runAction(window.localStorage, action);
        return JSON.stringify(responseFor(output, action));
      } catch (e) {
        return JSON.stringify({error: `Failed: ${e.message}`});
      }
    };
  </script>
</body>
</html>
