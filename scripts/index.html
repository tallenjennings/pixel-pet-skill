<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Pet v1.0</title>
  <style>
    :root {
      --bg: #d9d9c7;
      --panel: #efefdf;
      --ink: #1d1d1b;
      --line: #3d3d35;
      --bad: #9a5d4f;
      --screen: #f8f8ec;
      --pixel-size: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Courier New", Courier, monospace;
      background: var(--bg);
      color: var(--ink);
      padding: 12px;
    }
    .shell {
      max-width: 420px;
      margin: 0 auto;
      border: 3px solid var(--line);
      background: var(--panel);
      box-shadow: 6px 6px 0 rgba(0,0,0,0.12);
    }
    .header, .footer {
      padding: 10px 12px;
      border-bottom: 2px solid var(--line);
      background: #e3e3d2;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .footer {
      border-top: 2px solid var(--line);
      border-bottom: 0;
      font-size: 12px;
    }
    .screen {
      padding: 12px;
      border-bottom: 2px solid var(--line);
      background: var(--screen);
    }
    .pet-box {
      border: 2px solid var(--line);
      background: #fcfcf4;
      padding: 12px;
      min-height: 208px;
      display: grid;
      place-items: center;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 2px solid var(--line);
      background: #fffff5;
      padding: 4px 6px;
      font-size: 11px;
      max-width: 120px;
      text-align: center;
    }
    .sprite-wrap {
      image-rendering: pixelated;
      border: 2px solid var(--line);
      background: #d6f0ff;
      padding: 6px;
      box-shadow: inset 0 0 0 2px #f5fbff;
    }
    .sprite-grid {
      display: grid;
      grid-template-columns: repeat(16, var(--pixel-size));
      grid-template-rows: repeat(16, var(--pixel-size));
      gap: 0;
    }
    .px { width: var(--pixel-size); height: var(--pixel-size); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .stat {
      border: 2px solid var(--line);
      padding: 6px;
      background: #fffef8;
    }
    .bar {
      margin-top: 4px;
      height: 10px;
      border: 1px solid var(--line);
      background: #d9d9c7;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--ink);
      width: 0%;
    }
    .meta {
      border: 2px solid var(--line);
      padding: 8px;
      background: #fffef8;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    button {
      border: 2px solid var(--line);
      background: #f5f5e8;
      color: var(--ink);
      padding: 10px 8px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .log {
      border-top: 2px solid var(--line);
      padding: 10px 12px;
      font-size: 12px;
      min-height: 60px;
      background: #f2f2e4;
      white-space: pre-wrap;
    }
    .dead { color: var(--bad); font-weight: bold; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">Pixel Pet v1.0 / Retro Care Unit</div>
    <div class="screen">
      <div class="pet-box">
        <div class="bubble" id="bubble">...</div>
        <div class="sprite-wrap"><div class="sprite-grid" id="sprite"></div></div>
      </div>
      <div class="meta" id="meta"></div>
      <div class="grid" id="stats"></div>
      <div class="actions">
        <button data-action="feed_meal">Meal</button>
        <button data-action="feed_snack">Snack</button>
        <button data-action="play">Play</button>
        <button data-action="clean">Clean</button>
        <button data-action="medicine">Medicine</button>
        <button data-action="discipline">Discipline</button>
        <button data-action="sleep">Lights Off</button>
        <button data-action="status">Status</button>
      </div>
    </div>
    <div class="log" id="log">Booting pet...</div>
    <div class="footer">real-time care • neglect can be fatal</div>
  </div>

  <script>
    const STORAGE_KEY = 'pixel-pet-v1';
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const nowMs = () => Date.now();

      ],

      ],

      ],

        '..KWWWWWWWWK....',
        '...KK....KK.....',
        '................'
      ],
      asleep: [
        '....YY..........',
        '......YY........',
        '........YY......',
        '................',
        '...KKKKKKKK.....',
        '..KWWWWWWWWK....',
        '.KWWWWWWWWWWK...',

      ],
      dead: [
        '................',

        '...KKWWWWWWKK...',
        '..KWWRWWWWRWWK..',
        '..KWWRRWWRRWWK..',

        '..KWWWWWWWWWWK..',
        '...KWWWWWWWWK...',
        '....KKWWWWKK....',
        '.....KWWWWK.....',
        '......K..K......',
        '......K..K......',
        '................',
        '................'
      ]
    };

    const PALETTE = {
      '.': '#d6f0ff',
      K: '#1b1b1b',
      W: '#f5f5f1',
      B: '#242424',
      G: '#ff9aa2',
      R: '#ce4b4b',
      Y: '#ffe05c'
    };

    function createPet() {
      const now = nowMs();
      return {
        pet: {
          name: 'mame',
          stage: 'baby',
          ageHours: 0,
          weight: 5,
          alive: true,
          asleep: false,
          sick: false,
          attention: false,
          poop: 0,
          causeOfDeath: ''
        },
        stats: {
          hunger: 72,
          happiness: 70,
          energy: 74,
          hygiene: 78,
          health: 82,
          discipline: 24
        },
        hidden: {
          careMistakes: 0,
          missedAttention: 0,
          snackCount: 0,
          disciplineCount: 0,
          evolutionScore: 0,
          lastEvent: 'A strange little egg hatched.'
        },
        meta: {
          createdAt: now,
          lastUpdateAt: now,
          lastSleptAt: 0,
          lastAwakeAt: now,
          version: 1
        }
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return createPet();
        const parsed = JSON.parse(raw);
        return parsed && parsed.pet ? parsed : createPet();
      } catch {
        return createPet();
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      return state;
    }

    function hoursSince(timestamp) {
      return Math.max(0, (nowMs() - timestamp) / 3600000);
    }

    function stageForAge(ageHours) {
      if (ageHours < 6) return 'baby';
      if (ageHours < 24) return 'child';
      if (ageHours < 72) return 'teen';
      return 'adult';
    }

    function adultVariantFor(state) {
      const h = state.hidden;
      const s = state.stats;
      if (h.careMistakes <= 2 && h.missedAttention <= 1 && h.snackCount <= 6 && s.discipline >= 35) {
        return 'angel';
      }
      if (h.careMistakes >= 8 || h.missedAttention >= 5 || h.snackCount >= 12) {
        return 'blob';
      }
      return 'classic';
    }

    function spriteKeyFor(state) {
      const p = state.pet;
      const s = state.stats;
      if (!p.alive) return 'dead';
      if (p.asleep) return 'asleep';
      if (p.sick) return 'sick';
      if (p.poop > 0 || s.hygiene < 35) return 'dirty';
      if (p.attention || s.happiness < 30 || s.hunger < 25) return 'attention';
      return `normal_${p.stage}`;
    }

    function applyDecay(state) {
      if (!state.pet.alive) return state;
      const elapsedHours = hoursSince(state.meta.lastUpdateAt);
      if (elapsedHours <= 0) return state;

      const s = state.stats;
      const p = state.pet;
      const h = state.hidden;

      p.ageHours += elapsedHours;
      p.stage = stageForAge(p.ageHours);

      const hungerDrop = p.asleep ? 4 : 7;
      const happinessDrop = p.asleep ? 2 : 4;
      const energyDrop = p.asleep ? -10 : 5;
      const hygieneDrop = 3 + p.poop * 1.5;
      const disciplineDrop = 0.6;

      s.hunger = clamp(s.hunger - hungerDrop * elapsedHours, 0, 100);
      s.happiness = clamp(s.happiness - happinessDrop * elapsedHours, 0, 100);
      s.energy = clamp(s.energy - energyDrop * elapsedHours, 0, 100);
      s.hygiene = clamp(s.hygiene - hygieneDrop * elapsedHours, 0, 100);
      s.discipline = clamp(s.discipline - disciplineDrop * elapsedHours, 0, 100);

      if (Math.floor(hoursSince(state.meta.lastUpdateAt) / 1.8) < Math.floor(elapsedHours / 1.8)) {
        p.poop += 1;
      }
      if (Math.random() < Math.min(0.35, elapsedHours * 0.09) && !p.asleep) {
        p.attention = true;
      }

      const neglect = [s.hunger, s.happiness, s.energy, s.hygiene].filter(v => v < 20).length;
      if (neglect > 0) {
        s.health = clamp(s.health - elapsedHours * (5 + neglect * 4), 0, 100);
        h.careMistakes += elapsedHours * 0.5 * neglect;
      } else if (!p.sick) {
        s.health = clamp(s.health + elapsedHours * 1.25, 0, 100);
      }

      if ((s.hygiene < 25 || p.poop >= 3 || s.hunger < 15) && Math.random() < Math.min(0.5, 0.12 * elapsedHours)) {
        p.sick = true;
      }
      if (p.sick) {
        s.health = clamp(s.health - elapsedHours * 7, 0, 100);
      }

      if (p.attention && !p.asleep && Math.random() < Math.min(0.5, elapsedHours * 0.15)) {
        h.missedAttention += 1;
        s.happiness = clamp(s.happiness - 5, 0, 100);
      }

      if (h.snackCount > 8) {
        s.health = clamp(s.health - elapsedHours * 1.2, 0, 100);
      }

      if (s.health <= 0 || (s.hunger <= 0 && s.energy <= 0 && s.hygiene <= 0)) {
        p.alive = false;
        p.causeOfDeath = s.health <= 0 ? 'neglect' : 'extreme neglect';
        h.lastEvent = 'The pet went still.';
      }

      state.meta.lastUpdateAt = nowMs();
      return state;
    }

    function summarizeNeeds(state) {
      const s = state.stats;
      const p = state.pet;
      if (!p.alive) return '...';
      if (p.sick) return 'SICK';
      if (p.poop > 0) return 'CLEAN';
      if (s.hunger < 30) return 'HUNGRY';
      if (s.energy < 25) return 'SLEEPY';
      if (p.attention) return 'BEEP!';
      if (s.happiness < 35) return 'BORED';
      return 'OK';
    }

    function narrationFor(state, action) {
      const p = state.pet;
      const s = state.stats;
      if (!p.alive) return '... It has died.';
      if (action === 'feed_meal') return 'MEEP! It ate well.';
      if (action === 'feed_snack') return 'Chomp. It wants more.';
      if (action === 'play') return 'BEEP! It bounced around happily.';
      if (action === 'clean') return 'The screen is tidy again.';
      if (action === 'medicine') return p.sick ? 'It swallowed the medicine.' : 'It does not seem to need medicine.';
      if (action === 'discipline') return 'It stiffened and listened.';
      if (action === 'sleep') return 'The lights went out.';
      if (action === 'wake') return 'It blinked awake.';
      if (s.hunger < 25) return 'It looks hungry.';
      if (p.sick) return 'It looks sick.';
      if (p.poop > 0) return 'It made a mess.';
      if (s.energy < 20) return 'Its eyes look heavy.';
      if (p.attention) return 'BEEP! BEEP!';
      return '...';
    }

    function applyAction(state, action, payload) {
      state = applyDecay(state);
      const s = state.stats;
      const p = state.pet;
      const h = state.hidden;
      if (!p.alive && action !== 'reset') return state;

      switch (action) {
        case 'init':
        case 'status':
          break;
        case 'feed_meal':
          s.hunger = clamp(s.hunger + 24, 0, 100);
          s.health = clamp(s.health + 2, 0, 100);
          p.weight += 1;
          p.attention = false;
          h.evolutionScore += 1;
          break;
        case 'feed_snack':
          s.happiness = clamp(s.happiness + 16, 0, 100);
          s.hunger = clamp(s.hunger + 8, 0, 100);
          p.weight += 2;
          h.snackCount += 1;
          if (h.snackCount > 5) s.health = clamp(s.health - 3, 0, 100);
          break;
        case 'play':
          s.happiness = clamp(s.happiness + 18, 0, 100);
          s.energy = clamp(s.energy - 10, 0, 100);
          s.hunger = clamp(s.hunger - 6, 0, 100);
          s.discipline = clamp(s.discipline + 2, 0, 100);
          p.attention = false;
          h.evolutionScore += 1;
          break;
        case 'clean':
          p.poop = 0;
          s.hygiene = clamp(s.hygiene + 24, 0, 100);
          p.attention = false;
          break;
        case 'medicine':
          if (p.sick || s.health < 50) {
            p.sick = false;
            s.health = clamp(s.health + 16, 0, 100);
            s.happiness = clamp(s.happiness - 2, 0, 100);
          }
          break;
        case 'discipline':
          s.discipline = clamp(s.discipline + 12, 0, 100);
          s.happiness = clamp(s.happiness - 3, 0, 100);
          p.attention = false;
          h.disciplineCount += 1;
          h.evolutionScore += 0.5;
          break;
        case 'sleep':
          p.asleep = true;
          state.meta.lastSleptAt = nowMs();
          break;
        case 'wake':
          p.asleep = false;
          state.meta.lastAwakeAt = nowMs();
          break;
        case 'rename':
          if (payload && typeof payload.name === 'string') {
            const name = payload.name.trim().toLowerCase();
            if (name) p.name = name.slice(0, 12);
          }
          break;
        case 'reset':
          return createPet();
        default:
          break;
      }

      if (p.ageHours >= 6 && p.stage === 'child') h.lastEvent = 'It grew into a child.';
      if (p.ageHours >= 24 && p.stage === 'teen') h.lastEvent = 'It grew into a teen.';
      if (p.ageHours >= 72 && p.stage === 'adult') h.lastEvent = 'It became an adult.';

      state.meta.lastUpdateAt = nowMs();
      return saveState(state);
    }

    function responseFor(state, action) {
      const p = state.pet;
      const result = {
        result: p.alive
          ? `${p.name} is ${summarizeNeeds(state).toLowerCase()} and in ${p.stage} stage.`
          : `${p.name} has died from ${p.causeOfDeath || 'neglect'}.`,
        narration: narrationFor(state, action),
        dead: !p.alive,
        pet: state,
        dashboard_url: 'scripts/index.html',
        version: '1.0.0'
      };
      return JSON.stringify(result);
    }

    async function handlePayload(data) {
      let payload = {};
      if (typeof data === 'string' && data.trim()) {
        payload = JSON.parse(data);
      }
      const action = payload.action || 'status';
      const initial = action === 'reset' ? createPet() : loadState();
      const updated = applyAction(initial, action, payload);
      saveState(updated);
      render(updated, action);
      return responseFor(updated, action);
    }

    window.ai_edge_gallery_get_result = async (data) => {
      try {
        return await handlePayload(data);
      } catch (error) {
        return JSON.stringify({ error: error.message || String(error) });
      }
    };

    function renderSprite(state) {
      const spriteEl = document.getElementById('sprite');
      const key = spriteKeyFor(state);
      const pattern = SPRITES[key] || SPRITES.normal_baby;
      const cells = [];
      for (const row of pattern) {
        for (const char of row) {
          const color = PALETTE[char] || PALETTE['.'];
          cells.push(`<div class="px" style="background:${color}"></div>`);
        }
      }
      spriteEl.innerHTML = cells.join('');
    }

    function render(state, action) {
      const statsEl = document.getElementById('stats');
      const metaEl = document.getElementById('meta');
      const logEl = document.getElementById('log');
      const bubbleEl = document.getElementById('bubble');

      const p = state.pet;
      const s = state.stats;
      bubbleEl.textContent = summarizeNeeds(state);
      renderSprite(state);

      metaEl.innerHTML = [
        `<strong>Name:</strong> ${p.name}`,
        `<strong>Stage:</strong> ${p.stage}${p.stage === 'adult' ? ' / ' + adultVariantFor(state) : ''}`,
        `<strong>Age:</strong> ${p.ageHours.toFixed(1)}h`,
        `<strong>Weight:</strong> ${p.weight}`,
        `<strong>Poop:</strong> ${p.poop}`,
        `<strong>Status:</strong> ${p.alive ? (p.asleep ? 'asleep' : 'awake') : '<span class="dead">dead</span>'}`,
        `<strong>Sick:</strong> ${p.sick ? 'yes' : 'no'}`,
        `<strong>Attention:</strong> ${p.attention ? 'calling' : 'quiet'}`
      ].join(' • ');

      const entries = [
        ['Hunger', s.hunger],
        ['Happy', s.happiness],
        ['Energy', s.energy],
        ['Hygiene', s.hygiene],
        ['Health', s.health],
        ['Discipline', s.discipline]
      ];

      statsEl.innerHTML = entries.map(([label, value]) => `
        <div class="stat">
          <div>${label}: ${Math.round(value)}</div>
          <div class="bar"><div class="fill" style="width:${clamp(value, 0, 100)}%"></div></div>
        </div>`).join('');

      logEl.textContent = narrationFor(state, action);
    }

    document.querySelectorAll('button[data-action]').forEach((button) => {
      button.addEventListener('click', async () => {
        const action = button.dataset.action;
        try {
          const text = await window.ai_edge_gallery_get_result(JSON.stringify({ action }));
          const result = JSON.parse(text);
          if (result.error) {
            document.getElementById('log').textContent = `Error: ${result.error}`;
          }
        } catch (error) {
          document.getElementById('log').textContent = `Error: ${error.message || error}`;
        }
      });
    });

    (async () => {
      const state = saveState(applyDecay(loadState()));
      render(state, 'status');
    })();
  </script>
</body>
</html>
